<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Team Break Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f4; --bg3: #ebebea;
    --text: #1a1a18; --text2: #5f5e5a; --text3: #888780;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --radius: 8px; --radius-lg: 12px;
    --blue: #378ADD; --blue-dark: #185FA5; --blue-light: #E6F1FB; --blue-text: #0C447C;
    --green: #1D9E75; --green-light: #EAF3DE; --green-text: #3B6D11;
    --amber: #EF9F27; --amber-light: #FAEEDA; --amber-text: #854F0B;
    --red: #E24B4A; --red-light: #FCEBEB; --red-text: #A32D2D;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c; --bg2: #2a2a28; --bg3: #333331;
      --text: #f0ede8; --text2: #b4b2a9; --text3: #888780;
      --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
      --blue-light: #0c3258; --blue-text: #85B7EB;
      --green-light: #0a2e1a; --green-text: #5DCAA5;
      --amber-light: #2e1e04; --amber-text: #FAC775;
      --red-light: #2e0e0e; --red-text: #F09595;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; padding: 24px 16px; }
  .container { max-width: 700px; margin: 0 auto; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .top-bar h1 { font-size: 20px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .top-bar h1 i { font-size: 22px; color: var(--blue); }
  .rules-box { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 16px; font-size: 13px; color: var(--text2); display: flex; gap: 20px; flex-wrap: wrap; }
  .rule-item { display: flex; align-items: center; gap: 6px; }
  .tabs { display: flex; border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 16px; }
  .tab { flex: 1; padding: 10px 0; font-size: 14px; font-weight: 500; background: var(--bg2); color: var(--text2); border: none; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .tab.active { background: var(--bg); color: var(--text); border-bottom: 2px solid var(--blue); }
  .section { display: none; }
  .section.active { display: block; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 12px; }
  h3 { font-size: 15px; font-weight: 500; margin-bottom: 14px; }
  h4 { font-size: 14px; font-weight: 500; margin-bottom: 10px; }
  .row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; color: var(--text2); }
  select, input[type="time"] { height: 36px; padding: 0 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg2); color: var(--text); font-size: 14px; min-width: 110px; }
  select { min-width: 200px; }
  button { height: 36px; padding: 0 16px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: transparent; color: var(--text); font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: background 0.12s; }
  button:hover { background: var(--bg2); }
  button.primary { background: var(--blue); color: #fff; border-color: var(--blue); }
  button.primary:hover { background: var(--blue-dark); }
  button.danger { color: var(--red-text); border-color: var(--red); }
  button.danger:hover { background: var(--red-light); }
  .status-bar { border-radius: var(--radius); padding: 10px 14px; font-size: 13px; margin-top: 10px; }
  .status-ok { background: var(--green-light); color: var(--green-text); }
  .status-warn { background: var(--amber-light); color: var(--amber-text); }
  .status-err { background: var(--red-light); color: var(--red-text); }
  .member-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
  .member-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 12px 14px; }
  .member-name { font-size: 13px; font-weight: 500; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .member-time { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .prog-bg { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
  .badge-ok { background: var(--green-light); color: var(--green-text); }
  .badge-warn { background: var(--amber-light); color: var(--amber-text); }
  .badge-over { background: var(--red-light); color: var(--red-text); }
  .badge-active { background: var(--blue-light); color: var(--blue-text); }
  .log-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
  .log-item:last-child { border-bottom: none; }
  .summary-row { display: flex; justify-content: space-between; padding: 7px 0; font-size: 14px; border-bottom: 0.5px solid var(--border); }
  .summary-row:last-child { border-bottom: none; }
  .muted { color: var(--text2); }
  .empty { font-size: 14px; color: var(--text2); }
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <h1><i class="ti ti-clock"></i> Team Break Tracker</h1>
    <button class="danger" onclick="resetAll()" style="height:30px; font-size:12px;"><i class="ti ti-refresh"></i> Reset day</button>
  </div>

  <div class="rules-box">
    <div class="rule-item"><i class="ti ti-clock-stop" style="color:var(--amber-text);"></i><span>Single break: max <strong>60 min</strong></span></div>
    <div class="rule-item"><i class="ti ti-calendar-time" style="color:var(--blue);"></i><span>Daily total: max <strong>90 min</strong></span></div>
    <div class="rule-item"><i class="ti ti-repeat" style="color:var(--green);"></i><span>Any number of breaks allowed</span></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('log')"><i class="ti ti-door-enter"></i> Log break</button>
    <button class="tab" onclick="switchTab('dashboard')"><i class="ti ti-layout-dashboard"></i> Dashboard</button>
    <button class="tab" onclick="switchTab('summary')"><i class="ti ti-table"></i> Summary</button>
  </div>

  <div id="tab-log" class="section active">
    <div class="card">
      <h3>Log a break</h3>
      <div class="row">
        <div class="field" style="flex:1; min-width:200px;">
          <label>Team member</label>
          <select id="sel-member"><option value="">— select —</option></select>
        </div>
        <div class="field"><label>Break out</label><input type="time" id="inp-out"/></div>
        <div class="field"><label>Break in</label><input type="time" id="inp-in"/></div>
        <button class="primary" onclick="logBreak()" style="align-self:flex-end;"><i class="ti ti-plus"></i> Add</button>
      </div>
      <div id="log-status"></div>
    </div>
    <div class="card" id="log-history-card" style="display:none;">
      <h4>Today's log</h4>
      <div id="log-history"></div>
    </div>
  </div>

  <div id="tab-dashboard" class="section">
    <div class="member-grid" id="member-grid"></div>
  </div>

  <div id="tab-summary" class="section">
    <div class="card">
      <h3>End-of-day summary</h3>
      <div id="summary-table"></div>
    </div>
  </div>
</div>

<script>
const MEMBERS = [
  'Rachana Chikkgalagali',
  'Stalin Sasikumar',
  'Hemanth Kumar',
  'Ranganath TR',
  'Ediga Vinay Kumar',
  'Akshay Kumar K',
  'Praise be to God',
  'Anubhav Pandey',
  'Chadive Manil Kumar Reddy',
  'Dudekula Karimulla Mastan',
  'Honore Pascal Djhedehe Kplao',
  'Pradeep Arkasali',
  'Sanjeeb Altia',
  'Shyam',
  'Srikanth N C',
  'Subhasmita Panda'
];
const MAX_TOTAL = 90, MAX_SINGLE = 60;
let data = {};
try { data = JSON.parse(localStorage.getItem('breakTrackerV2') || 'null') || {}; } catch(e) { data = {}; }
MEMBERS.forEach(m => { if (!data[m]) data[m] = []; });
function save() { try { localStorage.setItem('breakTrackerV2', JSON.stringify(data)); } catch(e) {} }

const sel = document.getElementById('sel-member');
MEMBERS.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = m; sel.appendChild(o); });

function now() { const d = new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
document.getElementById('inp-out').value = now();
document.getElementById('inp-in').value = now();

function toMins(t) { const [h,m] = t.split(':').map(Number); return h*60+m; }
function fmtMins(m) { const h=Math.floor(m/60), min=m%60; return h>0?`${h}h ${String(min).padStart(2,'0')}m`:`${min}m`; }
function totalMins(member) { return data[member].reduce((s,b)=>s+b.dur,0); }
function setStatus(msg, cls) { document.getElementById('log-status').innerHTML=`<div class="status-bar ${cls}">${msg}</div>`; }

function logBreak() {
  const member = sel.value;
  const tout = document.getElementById('inp-out').value;
  const tin = document.getElementById('inp-in').value;
  if (!member) { setStatus('Please select a team member.','status-err'); return; }
  if (!tout||!tin) { setStatus('Please enter both break-out and break-in times.','status-err'); return; }
  const mOut=toMins(tout), mIn=toMins(tin);
  if (mIn<=mOut) { setStatus('Break-in time must be after break-out time.','status-err'); return; }
  const dur=mIn-mOut;
  if (dur>MAX_SINGLE) { setStatus(`<i class="ti ti-ban"></i> A single break cannot exceed <strong>1 hour (60 min)</strong>. This break is ${fmtMins(dur)} — please split it.`,'status-err'); return; }
  const used=totalMins(member);
  if (used+dur>MAX_TOTAL) { setStatus(`<i class="ti ti-alert-triangle"></i> Exceeds daily limit. <strong>${member}</strong> has <strong>${fmtMins(MAX_TOTAL-used)}</strong> remaining.`,'status-err'); return; }
  data[member].push({out:tout,in:tin,dur});
  save();
  const rem=MAX_TOTAL-used-dur;
  if (rem<=15) setStatus(`<i class="ti ti-alert-circle"></i> Added. <strong>${member}</strong> only has <strong>${fmtMins(rem)}</strong> left today.`,'status-warn');
  else setStatus(`<i class="ti ti-check"></i> Logged for <strong>${member}</strong>. Remaining: <strong>${fmtMins(rem)}</strong>`,'status-ok');
  renderAll();
  document.getElementById('inp-out').value=now();
  document.getElementById('inp-in').value=now();
}

function removeBreak(m,i) { data[m].splice(i,1); save(); renderAll(); }

function renderAll() { renderLog(); renderDashboard(); renderSummary(); }

function renderLog() {
  const logs=[];
  MEMBERS.forEach(m=>{ data[m].forEach((b,i)=>logs.push({m,b,i})); });
  logs.sort((a,b)=>a.b.out.localeCompare(b.b.out));
  const card=document.getElementById('log-history-card');
  const el=document.getElementById('log-history');
  if (!logs.length) { card.style.display='none'; return; }
  card.style.display='block';
  el.innerHTML=logs.map(l=>`<div class="log-item"><span><strong>${l.m}</strong> &nbsp;<span class="muted">${l.b.out} → ${l.b.in}</span></span><span style="display:flex;align-items:center;gap:10px;"><span style="font-weight:500;">${fmtMins(l.b.dur)}</span><button class="danger" style="height:26px;padding:0 10px;font-size:12px;" onclick="removeBreak('${l.m.replace(/'/g,"\\'")}',${l.i})"><i class="ti ti-trash"></i></button></span></div>`).join('');
}

function renderDashboard() {
  document.getElementById('member-grid').innerHTML=MEMBERS.map(m=>{
    const used=totalMins(m), pct=Math.min(100,Math.round((used/MAX_TOTAL)*100));
    let bar='#1D9E75', badge=`<span class="badge badge-ok">${fmtMins(MAX_TOTAL-used)} left</span>`;
    if (pct>=100){bar='#E24B4A';badge=`<span class="badge badge-over">limit reached</span>`;}
    else if (pct>=80){bar='#EF9F27';badge=`<span class="badge badge-warn">${fmtMins(MAX_TOTAL-used)} left</span>`;}
    return `<div class="member-card"><div class="member-name"><i class="ti ti-user" style="font-size:15px;color:var(--text2);flex-shrink:0;"></i>${m} ${badge}</div><div class="member-time">${fmtMins(used)}</div><div class="prog-bg"><div class="prog-fill" style="width:${pct}%;background:${bar};"></div></div><div style="font-size:11px;color:var(--text2);margin-top:4px;">${pct}% of 1h 30m · ${data[m].length} break${data[m].length!==1?'s':''}</div></div>`;
  }).join('');
}

function renderSummary() {
  const el=document.getElementById('summary-table');
  const sorted=[...MEMBERS].sort((a,b)=>totalMins(b)-totalMins(a));
  if (sorted.every(m=>!data[m].length)){el.innerHTML='<p class="empty">No breaks logged yet.</p>';return;}
  el.innerHTML=sorted.map(m=>{
    const used=totalMins(m), pct=Math.round((used/MAX_TOTAL)*100);
    let color='var(--green-text)';
    if (pct>=100)color='var(--red-text)'; else if(pct>=80)color='var(--amber-text)';
    return `<div class="summary-row"><span style="font-size:13px;">${m}</span><span style="display:flex;align-items:center;gap:12px;"><span class="muted" style="font-size:12px;">${data[m].length} break${data[m].length!==1?'s':''}</span><span style="font-weight:500;color:${color};min-width:60px;text-align:right;">${fmtMins(used)}</span><span class="muted" style="font-size:12px;min-width:38px;text-align:right;">${pct}%</span></span></div>`;
  }).join('');
}

function switchTab(t) {
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  ['log','dashboard','summary'].forEach((name,i)=>{ if(name===t){document.querySelectorAll('.tab')[i].classList.add('active');document.getElementById('tab-'+name).classList.add('active');} });
  renderAll();
}

function resetAll() {
  if (!confirm('Reset all break data for today?')) return;
  MEMBERS.forEach(m=>{data[m]=[];});save();
  document.getElementById('log-status').innerHTML='';
  renderAll();
}

renderAll();
</script>
</body>
</html>
